<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NGN ↔ GHS Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overscroll-behavior: none; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #e8e8e8;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.55);
      border-radius: 999px;
      padding: 4px;
      backdrop-filter: blur(8px);
    }

    .tab {
      padding: 8px 20px;
      border-radius: 999px;
      border: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: #8a8a8a;
      cursor: pointer;
      transition: background 150ms, color 150ms;
    }

    .tab.active {
      background: #ffffff;
      color: #111111;
      font-weight: 700;
      box-shadow: 0 1px 4px rgba(0,0,0,0.10);
    }

    /* ── Views ── */
    .view { display: none; width: 100%; flex-direction: column; align-items: center; gap: 14px; }
    .view.active { display: flex; }

    /* ── Panels ── */
    .panels { width: 100%; position: relative; }

    .panel { background: #ffffff; padding: 18px 18px 14px; width: 100%; }
    .panel.top    { border-radius: 20px 20px 0 0; border-bottom: 1px solid #f0f0f0; }
    .panel.bottom { border-radius: 0 0 20px 20px; }

    .panel-label { font-size: 14px; font-weight: 500; color: #9a9a9a; margin-bottom: 8px; }

    .panel-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }

    .amount-display {
      flex: 1; min-width: 0;
      font-size: clamp(28px, 8vw, 44px);
      font-weight: 700; color: #111;
      letter-spacing: -0.02em;
      cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.15;
      user-select: none; -webkit-user-select: none;
    }

    .amount-display.placeholder { color: #d0d0d0; }
    .amount-display.readonly-field { cursor: default; }

    .currency-pill {
      display: flex; align-items: center; gap: 7px;
      background: #f5f5f5; border-radius: 999px;
      padding: 7px 12px 7px 7px; flex-shrink: 0;
    }

    .currency-flag {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; line-height: 1;
    }

    .flag-ngn { background: #e8f5e9; }
    .flag-ghs { background: #fff3e0; }

    .currency-name { font-size: 15px; font-weight: 700; color: #111; }

    /* ── Swap button ── */
    .swap-btn {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid #e8e8e8; background: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 10; color: #444;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: background 150ms, transform 200ms ease-in-out;
    }

    .swap-btn:hover { background: #f5f5f5; }
    .swap-btn.spin  { transform: translate(-50%, -50%) rotate(180deg); }
    .swap-btn svg   { width: 16px; height: 16px; }

    /* ── Rate row ── */
    .rate-edit-row {
      width: 100%; background: #fff; border-radius: 14px;
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }

    .rate-edit-label { font-size: 13px; color: #9a9a9a; font-weight: 500; white-space: nowrap; }

    .rate-input-wrap { position: relative; display: flex; align-items: center; margin-left: auto; }

    .rate-edit-input {
      border: 1px solid #e5e5e5; border-radius: 8px;
      padding: 6px 44px 6px 10px;
      font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif;
      color: #111; background: #f5f5f5; outline: none;
      width: 80px; text-align: left;
      -moz-appearance: textfield; appearance: textfield;
      transition: border-color 150ms;
    }

    .rate-edit-input::-webkit-outer-spin-button,
    .rate-edit-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .rate-edit-input:focus { border-color: #6b21a8; background: #fff; }

    .rate-currency-suffix {
      position: absolute; right: 10px;
      font-size: 12px; font-weight: 400; color: #b0b0b0;
      pointer-events: none; user-select: none; white-space: nowrap;
    }

    /* ── CTA ── */
    .cta-btn {
      width: 100%; padding: 17px; border-radius: 999px;
      border: none; background: #111; color: #fff;
      font-family: 'Inter', sans-serif; font-size: 17px; font-weight: 700;
      cursor: pointer; transition: opacity 150ms; letter-spacing: -0.01em;
    }

    .cta-btn:hover  { opacity: 0.88; }
    .cta-btn:active { opacity: 0.75; }

    /* ── Rate footer ── */
    .rate-footer {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; font-size: 13px; color: #9a9a9a;
    }

    .rate-footer .rate-highlight { color: #6b21a8; font-weight: 500; }
    .rate-divider { width: 1px; height: 14px; background: #ccc; }

    /* ── History view ── */
    .history-header {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
    }

    .history-title { font-size: 18px; font-weight: 700; color: #111; letter-spacing: -0.01em; }

    .clear-btn {
      font-size: 13px; font-weight: 500; color: #9a9a9a;
      background: none; border: none; cursor: pointer; padding: 4px 0;
      transition: color 150ms;
    }

    .clear-btn:hover { color: #dc2626; }

    .history-list { width: 100%; display: flex; flex-direction: column; gap: 10px; }

    .history-item {
      background: #fff; border-radius: 16px;
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      animation: slideIn 200ms ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .history-amounts { display: flex; flex-direction: column; gap: 3px; }

    .history-from { font-size: 16px; font-weight: 700; color: #111; letter-spacing: -0.01em; }

    .history-to { font-size: 13px; font-weight: 500; color: #6b21a8; }

    .history-meta { text-align: right; display: flex; flex-direction: column; gap: 3px; align-items: flex-end; }

    .history-direction {
      font-size: 11px; font-weight: 600; color: #fff;
      background: #111; border-radius: 6px; padding: 2px 7px;
      letter-spacing: 0.04em;
    }

    .history-time { font-size: 11px; color: #b0b0b0; font-weight: 400; }

    .history-empty {
      width: 100%; background: #fff; border-radius: 16px;
      padding: 40px 20px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }

    .history-empty-icon { font-size: 32px; line-height: 1; }
    .history-empty-text { font-size: 15px; font-weight: 600; color: #111; }
    .history-empty-sub  { font-size: 13px; color: #9a9a9a; }

    /* ── Keypad overlay ── */
    .keypad-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; justify-content: flex-end;
      pointer-events: none; opacity: 0;
      transition: opacity 200ms ease;
    }

    .keypad-overlay.open { pointer-events: auto; opacity: 1; }

    .keypad-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.25); }

    .keypad-sheet {
      position: relative; z-index: 1;
      background: #f5f5f5; border-radius: 24px 24px 0 0;
      padding: 12px 16px 32px;
      transform: translateY(100%);
      transition: transform 300ms cubic-bezier(0.32, 0.72, 0, 1);
    }

    .keypad-overlay.open .keypad-sheet { transform: translateY(0); }

    .keypad-handle {
      width: 36px; height: 4px; background: #ccc;
      border-radius: 2px; margin: 0 auto 14px;
    }

    .keypad-display {
      background: #fff; border-radius: 14px;
      padding: 14px 18px; margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }

    .keypad-display-amount {
      font-size: 32px; font-weight: 700; color: #111;
      letter-spacing: -0.02em; flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .keypad-display-currency { font-size: 14px; font-weight: 600; color: #9a9a9a; flex-shrink: 0; }

    .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

    .key {
      background: #fff; border: none; border-radius: 14px;
      padding: 0; height: 64px;
      font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 600; color: #111;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 100ms, transform 80ms;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
      -webkit-tap-highlight-color: transparent;
    }

    .key:active { background: #e8e8e8; transform: scale(0.96); }
    .key.key-dot  { font-size: 26px; font-weight: 700; }
    .key.key-del  { background: #ebe6f0; color: #6b21a8; font-size: 18px; }
    .key.key-del:active { background: #d8cfe6; }
    .key.key-done { background: #111; color: #fff; }
    .key.key-done:active { background: #333; }

    @media (max-width: 380px) {
      .tab { padding: 7px 14px; font-size: 14px; }
      .key { height: 56px; font-size: 20px; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Tabs -->
  <div class="tabs" role="tablist">
    <button class="tab active" role="tab" data-view="convert">Convert</button>
    <button class="tab" role="tab" data-view="history">History</button>
  </div>

  <!-- Convert view -->
  <div class="view active" id="view-convert">

    <div class="panels">
      <div class="panel top">
        <div class="panel-label">Sell</div>
        <div class="panel-row">
          <div class="amount-display placeholder" id="from-display" tabindex="0" role="button" aria-label="Enter amount to sell">0</div>
          <div class="currency-pill">
            <div class="currency-flag flag-ngn" id="from-flag">🇳🇬</div>
            <span class="currency-name" id="from-name">NGN</span>
          </div>
        </div>
      </div>

      <button class="swap-btn" id="swap-btn" aria-label="Swap currencies">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transform:rotate(90deg)">
          <path d="M8 3L4 7l4 4M4 7h16"/><path d="M16 21l4-4-4-4m4 4H4"/>
        </svg>
      </button>

      <div class="panel bottom">
        <div class="panel-label">Buy</div>
        <div class="panel-row">
          <div class="amount-display placeholder readonly-field" id="to-display">0</div>
          <div class="currency-pill">
            <div class="currency-flag flag-ghs" id="to-flag">🇬🇭</div>
            <span class="currency-name" id="to-name">GHS</span>
          </div>
        </div>
      </div>
    </div>

    <div class="rate-edit-row">
      <span class="rate-edit-label" id="rate-label">1,000 NGN =</span>
      <div class="rate-input-wrap">
        <input type="number" class="rate-edit-input" id="rate-input" value="49" min="0.000001" step="any" />
        <span class="rate-currency-suffix" id="rate-unit">GHS</span>
      </div>
    </div>

    <button class="cta-btn" id="cta-btn">Convert</button>

    <div class="rate-footer">
      <span id="footer-rate">1,000 GHS = <span class="rate-highlight">20,410 NGN</span></span>
      <div class="rate-divider"></div>
      <span>Tap amount to enter</span>
    </div>

  </div>

  <!-- History view -->
  <div class="view" id="view-history">
    <div class="history-header">
      <span class="history-title">History</span>
      <button class="clear-btn" id="clear-btn">Clear all</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>

</div>

<!-- Keypad overlay -->
<div class="keypad-overlay" id="keypad-overlay" role="dialog" aria-modal="true" aria-label="Number keypad">
  <div class="keypad-backdrop" id="keypad-backdrop"></div>
  <div class="keypad-sheet">
    <div class="keypad-handle"></div>
    <div class="keypad-display">
      <div class="keypad-display-amount" id="keypad-display-amount">0</div>
      <div class="keypad-display-currency" id="keypad-display-currency">NGN</div>
    </div>
    <div class="keypad-grid">
      <button class="key" data-key="1">1</button>
      <button class="key" data-key="2">2</button>
      <button class="key" data-key="3">3</button>
      <button class="key" data-key="4">4</button>
      <button class="key" data-key="5">5</button>
      <button class="key" data-key="6">6</button>
      <button class="key" data-key="7">7</button>
      <button class="key" data-key="8">8</button>
      <button class="key" data-key="9">9</button>
      <button class="key key-dot" data-key=".">·</button>
      <button class="key" data-key="0">0</button>
      <button class="key key-del" data-key="del">⌫</button>
    </div>
    <button class="key key-done" id="keypad-done" style="margin-top:10px;width:100%;height:54px;font-size:17px;border-radius:14px;">Done</button>
  </div>
</div>

<script>
  const CURRENCIES = {
    NGN: { flag: '🇳🇬', flagClass: 'flag-ngn', symbol: '₦' },
    GHS: { flag: '🇬🇭', flagClass: 'flag-ghs', symbol: '₵' },
  };

  let isNGNtoGHS = true;
  const rates = { NGN_GHS: 0.049, GHS_NGN: 20.41 };
  let rawAmount = '';

  const fromDisplay   = document.getElementById('from-display');
  const toDisplay     = document.getElementById('to-display');
  const fromFlag      = document.getElementById('from-flag');
  const toFlag        = document.getElementById('to-flag');
  const fromName      = document.getElementById('from-name');
  const toName        = document.getElementById('to-name');
  const rateInput     = document.getElementById('rate-input');
  const rateLabel     = document.getElementById('rate-label');
  const rateUnit      = document.getElementById('rate-unit');
  const footerRate    = document.getElementById('footer-rate');
  const swapBtn       = document.getElementById('swap-btn');
  const ctaBtn        = document.getElementById('cta-btn');
  const keypadOverlay = document.getElementById('keypad-overlay');
  const keypadBackdrop= document.getElementById('keypad-backdrop');
  const keypadDispAmt = document.getElementById('keypad-display-amount');
  const keypadDispCur = document.getElementById('keypad-display-currency');
  const keypadDone    = document.getElementById('keypad-done');
  const historyList   = document.getElementById('history-list');
  const clearBtn      = document.getElementById('clear-btn');

  /* ── History (localStorage) ── */
  const HISTORY_KEY = 'ngn_ghs_history';

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
    catch { return []; }
  }

  function saveHistory(items) {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(items));
  }

  function addHistoryEntry(from, to, amount, result, rate) {
    const items = loadHistory();
    items.unshift({ from, to, amount, result, rate, ts: Date.now() });
    if (items.length > 50) items.pop();
    saveHistory(items);
  }

  function formatTime(ts) {
    const d = new Date(ts);
    const now = new Date();
    const diffMs = now - d;
    const diffMin = Math.floor(diffMs / 60000);
    if (diffMin < 1)   return 'Just now';
    if (diffMin < 60)  return `${diffMin}m ago`;
    const diffH = Math.floor(diffMin / 60);
    if (diffH < 24)    return `${diffH}h ago`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function renderHistory() {
    const items = loadHistory();
    if (items.length === 0) {
      historyList.innerHTML = `
        <div class="history-empty">
          <div class="history-empty-icon">🕐</div>
          <div class="history-empty-text">No conversions yet</div>
          <div class="history-empty-sub">Your converted amounts will appear here</div>
        </div>`;
      return;
    }

    historyList.innerHTML = items.map(item => {
      const fromSym = CURRENCIES[item.from].symbol;
      const toSym   = CURRENCIES[item.to].symbol;
      const amtFmt  = parseFloat(item.amount).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const resFmt  = parseFloat(item.result).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
      return `
        <div class="history-item">
          <div class="history-amounts">
            <div class="history-from">${fromSym}${amtFmt}</div>
            <div class="history-to">→ ${toSym}${resFmt}</div>
          </div>
          <div class="history-meta">
            <span class="history-direction">${item.from} → ${item.to}</span>
            <span class="history-time">${formatTime(item.ts)}</span>
          </div>
        </div>`;
    }).join('');
  }

  clearBtn.addEventListener('click', () => {
    if (loadHistory().length === 0) return;
    saveHistory([]);
    renderHistory();
  });

  /* ── Tab switching ── */
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`view-${tab.dataset.view}`).classList.add('active');
      if (tab.dataset.view === 'history') renderHistory();
    });
  });

  /* ── Helpers ── */
  function currentRate() {
    return (parseFloat(rateInput.value) || (isNGNtoGHS ? rates.NGN_GHS : rates.GHS_NGN) * 1000) / 1000;
  }

  function fmtLive(raw) {
    if (!raw || raw === '0') return '0';
    const [intPart, decPart] = raw.split('.');
    const intFormatted = parseInt(intPart || '0', 10).toLocaleString('en-US');
    return decPart !== undefined ? intFormatted + '.' + decPart : intFormatted;
  }

  function updateDisplays() {
    const amount = parseFloat(rawAmount) || 0;
    const result = amount * currentRate();
    const from   = isNGNtoGHS ? 'NGN' : 'GHS';

    fromDisplay.textContent = rawAmount && rawAmount !== '0' ? fmtLive(rawAmount) : '0';
    fromDisplay.classList.toggle('placeholder', !rawAmount || rawAmount === '0');

    toDisplay.textContent = amount > 0
      ? result.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 })
      : '0';
    toDisplay.classList.toggle('placeholder', amount === 0);

    keypadDispAmt.textContent = fmtLive(rawAmount) || '0';
    keypadDispCur.textContent = from;
  }

  function updateLabels() {
    const from = isNGNtoGHS ? 'NGN' : 'GHS';
    const to   = isNGNtoGHS ? 'GHS' : 'NGN';

    fromFlag.textContent = CURRENCIES[from].flag;
    fromFlag.className   = `currency-flag ${CURRENCIES[from].flagClass}`;
    fromName.textContent = from;
    toFlag.textContent   = CURRENCIES[to].flag;
    toFlag.className     = `currency-flag ${CURRENCIES[to].flagClass}`;
    toName.textContent   = to;

    const rate   = isNGNtoGHS ? rates.NGN_GHS : rates.GHS_NGN;
    const rate1k = parseFloat((rate * 1000).toFixed(4));
    const inv1k  = parseFloat(((1 / rate) * 1000).toFixed(2));
    rateInput.value = rate1k;
    rateLabel.textContent = `1,000 ${from} =`;
    rateUnit.textContent  = to;
    footerRate.innerHTML  = `1,000 ${to} = <span class="rate-highlight">${inv1k.toLocaleString('en-US')} ${from}</span>`;
    keypadDispCur.textContent = from;
  }

  /* ── Keypad ── */
  function openKeypad() {
    keypadOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeKeypad() {
    keypadOverlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  function handleKey(k) {
    if (k === 'del') {
      rawAmount = rawAmount.slice(0, -1);
    } else if (k === '.') {
      if (rawAmount.includes('.')) return;
      rawAmount = rawAmount === '' ? '0.' : rawAmount + '.';
    } else {
      if (rawAmount === '0') rawAmount = k;
      else rawAmount += k;
      const parts = rawAmount.split('.');
      if (parts[0].length > 12) { rawAmount = rawAmount.slice(0, -1); return; }
      if (parts[1] && parts[1].length > 4) { rawAmount = rawAmount.slice(0, -1); return; }
    }
    updateDisplays();
  }

  document.querySelectorAll('.key[data-key]').forEach(btn => {
    btn.addEventListener('click', () => handleKey(btn.dataset.key));
  });

  fromDisplay.addEventListener('click', openKeypad);
  fromDisplay.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openKeypad(); });
  keypadBackdrop.addEventListener('click', closeKeypad);
  keypadDone.addEventListener('click', closeKeypad);

  /* ── Swap ── */
  swapBtn.addEventListener('click', () => {
    isNGNtoGHS = !isNGNtoGHS;
    rawAmount = '';
    swapBtn.classList.add('spin');
    setTimeout(() => swapBtn.classList.remove('spin'), 210);
    updateLabels();
    updateDisplays();
  });

  /* ── Rate input ── */
  rateInput.addEventListener('input', () => {
    const rate1k = parseFloat(rateInput.value);
    if (rate1k > 0) {
      const perUnit = rate1k / 1000;
      if (isNGNtoGHS) { rates.NGN_GHS = perUnit; rates.GHS_NGN = parseFloat((1 / perUnit).toFixed(4)); }
      else             { rates.GHS_NGN = perUnit; rates.NGN_GHS = parseFloat((1 / perUnit).toFixed(6)); }
      const from = isNGNtoGHS ? 'NGN' : 'GHS';
      const to   = isNGNtoGHS ? 'GHS' : 'NGN';
      const inv1k = parseFloat(((1 / perUnit) * 1000).toFixed(2));
      footerRate.innerHTML = `1,000 ${to} = <span class="rate-highlight">${inv1k.toLocaleString('en-US')} ${from}</span>`;
    }
    updateDisplays();
  });

  /* ── Convert ── */
  ctaBtn.addEventListener('click', () => {
    const amount = parseFloat(rawAmount);
    if (!amount || amount <= 0) { openKeypad(); return; }
    const from   = isNGNtoGHS ? 'NGN' : 'GHS';
    const to     = isNGNtoGHS ? 'GHS' : 'NGN';
    const result = amount * currentRate();
    addHistoryEntry(from, to, amount, result, currentRate());
    // flash the to-display as confirmation
    toDisplay.style.color = '#16a34a';
    setTimeout(() => toDisplay.style.color = '', 600);
  });

  /* ── Init ── */
  updateLabels();
  updateDisplays();
</script>
</body>
</html>
