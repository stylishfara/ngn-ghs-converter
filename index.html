<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NGN ↔ GHS Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overscroll-behavior: none; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #e8e8e8;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 16px 32px;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.55);
      border-radius: 999px;
      padding: 4px;
      backdrop-filter: blur(8px);
    }

    .tab {
      padding: 8px 20px;
      border-radius: 999px;
      border: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: #737373;
      cursor: pointer;
      transition: background 150ms, color 150ms;
    }

    .tab.active {
      background: #ffffff;
      color: #262626;
      font-weight: 500;
      box-shadow: 0 1px 4px rgba(0,0,0,0.10);
    }

    /* ── Views ── */
    .view { display: none; width: 100%; flex-direction: column; align-items: center; gap: 14px; }
    .view.active { display: flex; }

    /* ── Panels ── */
    .panels { width: 100%; position: relative; }

    .panel { background: #ffffff; padding: 24px 20px 20px; width: 100%; }
    .panel.top    { border-radius: 20px 20px 0 0; border-bottom: 1px solid #f0f0f0; }
    .panel.bottom { border-radius: 0 0 20px 20px; }

    .panel-label { font-size: 14px; font-weight: 500; color: #737373; margin-bottom: 8px; }

    .panel-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }

    /* Hidden native input — invisible but focusable */
    .native-input {
      position: absolute;
      opacity: 0;
      width: 1px;
      height: 1px;
      top: 0;
      left: 0;
      border: none;
      outline: none;
      pointer-events: none;
    }

    .amount-display {
      flex: 1; min-width: 0;
      font-size: clamp(28px, 8vw, 44px);
      font-weight: 500; color: #262626;
      letter-spacing: -0.02em;
      cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.15;
      user-select: none; -webkit-user-select: none;
      position: relative;
    }

    .amount-display.placeholder { color: #d0d0d0; }
    .amount-display.focused::after {
      content: '';
      display: inline-block;
      width: 2px;
      height: 0.85em;
      background: #6b21a8;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    .amount-display.readonly-field { cursor: default; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .currency-pill {
      display: flex; align-items: center; gap: 7px;
      background: #f5f5f5; border-radius: 999px;
      padding: 7px 12px 7px 7px; flex-shrink: 0;
    }

    .currency-flag {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; line-height: 1;
    }

    .flag-ngn { background: #e8f5e9; }
    .flag-ghs { background: #fff3e0; }

    .currency-name { font-size: 15px; font-weight: 500; color: #262626; }

    /* ── Swap button ── */
    .swap-btn {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid #e8e8e8; background: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 10; color: #737373;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: background 150ms, transform 200ms ease-in-out;
    }

    .swap-btn:hover { background: #f5f5f5; }
    .swap-btn.spin  { transform: translate(-50%, -50%) rotate(180deg); }
    .swap-btn svg   { width: 16px; height: 16px; }

    /* ── Rate card ── */
    .rate-card {
      width: 100%; background: #fff; border-radius: 14px;
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }

    .rate-card-header {
      display: flex; align-items: center; justify-content: space-between;
    }

    .rate-card-title { font-size: 13px; font-weight: 500; color: #737373; }

    .rate-edit-btn {
      font-size: 12px; font-weight: 500; color: #737373;
      background: #f5f5f5; border: none; border-radius: 6px;
      padding: 3px 10px; cursor: pointer;
      transition: background 150ms, color 150ms;
    }

    .rate-edit-btn:hover { background: #e5e5e5; color: #262626; }

    .rate-save-btn {
      font-size: 12px; font-weight: 500; color: #fff;
      background: #262626; border: none; border-radius: 6px;
      padding: 3px 10px; cursor: pointer;
      transition: opacity 150ms;
    }

    .rate-save-btn:hover { opacity: 0.85; }

    /* Single-line rate row */
    .rate-line {
      display: flex; align-items: center; justify-content: space-between;
    }

    .rate-side {
      display: flex; align-items: center; gap: 5px;
    }

    .rate-amount {
      font-size: 14px; font-weight: 500; color: #262626;
    }

    .rate-currency {
      font-size: 13px; font-weight: 500; color: #737373;
    }

    .rate-equals {
      font-size: 13px; font-weight: 500; color: #737373;
    }

    .rate-inline-input {
      border: 1px solid #e5e5e5; border-radius: 6px;
      padding: 4px 8px;
      font-size: 14px; font-weight: 500; font-family: 'Inter', sans-serif;
      color: #262626; background: #f5f5f5; outline: none;
      width: 72px;
      -moz-appearance: textfield; appearance: textfield;
      transition: border-color 150ms;
    }

    .rate-inline-input::-webkit-outer-spin-button,
    .rate-inline-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .rate-inline-input:focus { border-color: #262626; background: #fff; }

    /* ── CTA ── */
    .cta-btn {
      width: 100%; padding: 17px; border-radius: 999px;
      border: none; background: #262626; color: #fff;
      font-family: 'Inter', sans-serif; font-size: 17px; font-weight: 500;
      cursor: pointer; transition: opacity 150ms; letter-spacing: -0.01em;
    }

    .cta-btn:hover  { opacity: 0.88; }
    .cta-btn:active { opacity: 0.75; }

    /* ── Rate footer ── */
    .rate-footer {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; font-size: 13px; color: #737373;
    }

    .rate-footer .rate-highlight { color: #6b21a8; font-weight: 500; }
    .rate-divider { width: 1px; height: 14px; background: #ccc; }

    /* ── History view ── */
    .history-header {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
    }

    .history-title { font-size: 18px; font-weight: 700; color: #262626; letter-spacing: -0.01em; }

    .clear-btn {
      font-size: 13px; font-weight: 500; color: #737373;
      background: none; border: none; cursor: pointer; padding: 4px 0;
      transition: color 150ms;
    }

    .clear-btn:hover { color: #dc2626; }

    .history-list { width: 100%; display: flex; flex-direction: column; gap: 10px; }

    .history-item {
      background: #fff; border-radius: 16px;
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      animation: slideIn 200ms ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .history-amounts { display: flex; flex-direction: column; gap: 6px; }
    .history-from { font-size: 16px; font-weight: 500; color: #262626; letter-spacing: -0.01em; }

    .history-arrow {
      display: flex; align-items: center; gap: 6px;
    }

    .history-arrow-line {
      display: flex; align-items: center; gap: 4px; color: #b0b0b0;
    }

    .history-to { font-size: 14px; font-weight: 500; color: #262626; }

    .history-meta { text-align: right; display: flex; flex-direction: column; gap: 3px; align-items: flex-end; }

    .history-direction {
      font-size: 12px; font-weight: 500; color: #737373;
      background: #f5f5f5; border: none;
      border-radius: 4px; padding: 2px 8px;
    }

    .history-time { font-size: 11px; color: #b0b0b0; }

    .history-empty {
      width: 100%; background: #fff; border-radius: 16px;
      padding: 40px 20px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }

    .history-empty-icon { font-size: 32px; line-height: 1; }
    .history-empty-text { font-size: 15px; font-weight: 500; color: #262626; }
    .history-empty-sub  { font-size: 13px; color: #737373; }

    @media (max-width: 380px) {
      .tab { padding: 7px 14px; font-size: 14px; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Tabs -->
  <div class="tabs" role="tablist">
    <button class="tab active" role="tab" data-view="convert">Convert</button>
    <button class="tab" role="tab" data-view="history">History</button>
  </div>

  <!-- Convert view -->
  <div class="view active" id="view-convert">

    <div class="panels">
      <!-- Hidden native input that drives the amount -->
      <input
        class="native-input"
        id="native-input"
        type="number"
        inputmode="decimal"
        min="0"
        step="any"
        autocomplete="off"
        aria-hidden="true"
        tabindex="-1"
      />

      <div class="panel top">
        <div class="panel-label">From</div>
        <div class="panel-row">
          <div class="amount-display placeholder" id="from-display" tabindex="0" role="button" aria-label="Enter amount to sell">0</div>
          <div class="currency-pill">
            <div class="currency-flag flag-ngn" id="from-flag"></div>
            <span class="currency-name" id="from-name">NGN</span>
          </div>
        </div>
      </div>

      <button class="swap-btn" id="swap-btn" aria-label="Swap currencies">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transform:rotate(90deg)">
          <path d="M8 3L4 7l4 4M4 7h16"/><path d="M16 21l4-4-4-4m4 4H4"/>
        </svg>
      </button>

      <div class="panel bottom">
        <div class="panel-label">To</div>
        <div class="panel-row">
          <div class="amount-display placeholder readonly-field" id="to-display">0</div>
          <div class="currency-pill">
            <div class="currency-flag flag-ghs" id="to-flag"></div>
            <span class="currency-name" id="to-name">GHS</span>
          </div>
        </div>
      </div>
    </div>

    <div class="rate-card">
      <div class="rate-card-header">
        <span class="rate-card-title">Exchange Rate</span>
        <button class="rate-edit-btn" id="rate-edit-btn">Edit</button>
      </div>
      <!-- Display mode -->
      <div class="rate-line" id="rate-display-line">
        <div class="rate-side">
          <span class="rate-amount" id="rate-disp-left">1,000</span>
          <span class="rate-currency" id="rate-disp-left-cur">NGN</span>
        </div>
        <span class="rate-equals">=</span>
        <div class="rate-side">
          <span class="rate-amount" id="rate-disp-right">49</span>
          <span class="rate-currency" id="rate-disp-right-cur">GHS</span>
        </div>
      </div>
      <!-- Edit mode -->
      <div class="rate-line" id="rate-edit-line" style="display:none">
        <div class="rate-side">
          <input type="number" inputmode="decimal" class="rate-inline-input" id="rate-input-left" value="1000" min="1" step="any" />
          <span class="rate-currency" id="rate-edit-left-cur">NGN</span>
        </div>
        <span class="rate-equals">=</span>
        <div class="rate-side">
          <input type="number" inputmode="decimal" class="rate-inline-input" id="rate-input-right" value="49" min="0.000001" step="any" />
          <span class="rate-currency" id="rate-edit-right-cur">GHS</span>
        </div>
      </div>
    </div>

    <button class="cta-btn" id="cta-btn">Convert</button>

  </div>

  <!-- History view -->
  <div class="view" id="view-history">
    <div class="history-header">
      <span class="history-title">History</span>
      <button class="clear-btn" id="clear-btn">Clear all</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>

</div>

<script>
  const FLAGS = {
    NGN: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="22" height="22" style="border-radius:50%;display:block"><rect width="900" height="600" fill="#fff"/><rect width="300" height="600" fill="#008751"/><rect x="600" width="300" height="600" fill="#008751"/></svg>`,
    GHS: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="22" height="22" style="border-radius:50%;display:block"><rect width="900" height="200" fill="#CE1126"/><rect y="200" width="900" height="200" fill="#FCD116"/><rect y="400" width="900" height="200" fill="#006B3F"/><polygon points="450,180 474,252 550,252 490,296 512,368 450,324 388,368 410,296 350,252 426,252" fill="#000"/></svg>`,
  };

  const CURRENCIES = {
    NGN: { flagSVG: FLAGS.NGN, flagClass: 'flag-ngn', symbol: '₦' },
    GHS: { flagSVG: FLAGS.GHS, flagClass: 'flag-ghs', symbol: '₵' },
  };

  let isNGNtoGHS = true;
  const rates = { NGN_GHS: 0.049, GHS_NGN: 20.41 };
  let rateEditing = false;

  const fromDisplay   = document.getElementById('from-display');
  const toDisplay     = document.getElementById('to-display');
  const fromFlag      = document.getElementById('from-flag');
  const toFlag        = document.getElementById('to-flag');
  const fromName      = document.getElementById('from-name');
  const toName        = document.getElementById('to-name');
  const swapBtn       = document.getElementById('swap-btn');
  const ctaBtn        = document.getElementById('cta-btn');
  const nativeInput   = document.getElementById('native-input');
  const historyList   = document.getElementById('history-list');
  const clearBtn      = document.getElementById('clear-btn');

  const rateEditBtn      = document.getElementById('rate-edit-btn');
  const rateDisplayLine  = document.getElementById('rate-display-line');
  const rateEditLine     = document.getElementById('rate-edit-line');
  const rateDispLeft     = document.getElementById('rate-disp-left');
  const rateDispLeftCur  = document.getElementById('rate-disp-left-cur');
  const rateDispRight    = document.getElementById('rate-disp-right');
  const rateDispRightCur = document.getElementById('rate-disp-right-cur');
  const rateInputLeft    = document.getElementById('rate-input-left');
  const rateInputRight   = document.getElementById('rate-input-right');
  const rateEditLeftCur  = document.getElementById('rate-edit-left-cur');
  const rateEditRightCur = document.getElementById('rate-edit-right-cur');

  /* ── Native input focus trick ── */
  function openKeypad() {
    nativeInput.style.pointerEvents = 'auto';
    nativeInput.focus();
    nativeInput.style.pointerEvents = 'none';
    fromDisplay.classList.add('focused');
  }

  nativeInput.addEventListener('blur', () => fromDisplay.classList.remove('focused'));
  nativeInput.addEventListener('input', updateDisplays);

  fromDisplay.addEventListener('click', openKeypad);
  fromDisplay.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') openKeypad();
  });

  /* ── Helpers ── */
  function currentRate() {
    return isNGNtoGHS ? rates.NGN_GHS : rates.GHS_NGN;
  }

  function fmtLive(val) {
    if (!val) return '0';
    const [intPart, decPart] = String(val).split('.');
    const intFormatted = parseInt(intPart || '0', 10).toLocaleString('en-US');
    return decPart !== undefined ? intFormatted + '.' + decPart : intFormatted;
  }

  function updateDisplays() {
    const raw    = nativeInput.value;
    const amount = parseFloat(raw) || 0;
    const result = amount * currentRate();

    fromDisplay.textContent = raw ? fmtLive(raw) : '0';
    fromDisplay.classList.toggle('placeholder', !raw || amount === 0);

    toDisplay.textContent = amount > 0
      ? result.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 })
      : '0';
    toDisplay.classList.toggle('placeholder', amount === 0);
  }

  function updateRateCard() {
    // Always show as: [leftAmt] [fromCur] = [rightAmt] [toCur]
    // Left is always 1,000 units of the "from" currency
    const from   = isNGNtoGHS ? 'NGN' : 'GHS';
    const to     = isNGNtoGHS ? 'GHS' : 'NGN';
    const rate   = isNGNtoGHS ? rates.NGN_GHS : rates.GHS_NGN;
    const right  = parseFloat((rate * 1000).toFixed(4));

    rateDispLeft.textContent     = '1,000';
    rateDispLeftCur.textContent  = from;
    rateDispRight.textContent    = right.toLocaleString('en-US');
    rateDispRightCur.textContent = to;

    rateInputLeft.value          = 1000;
    rateEditLeftCur.textContent  = from;
    rateInputRight.value         = right;
    rateEditRightCur.textContent = to;
  }

  function updateLabels() {
    const from = isNGNtoGHS ? 'NGN' : 'GHS';
    const to   = isNGNtoGHS ? 'GHS' : 'NGN';

    fromFlag.innerHTML   = CURRENCIES[from].flagSVG;
    fromFlag.className   = `currency-flag ${CURRENCIES[from].flagClass}`;
    fromName.textContent = from;
    toFlag.innerHTML     = CURRENCIES[to].flagSVG;
    toFlag.className     = `currency-flag ${CURRENCIES[to].flagClass}`;
    toName.textContent   = to;

    updateRateCard();
  }

  /* ── Rate edit / save ── */
  function setRateEditMode(editing) {
    rateEditing = editing;
    rateDisplayLine.style.display = editing ? 'none' : 'flex';
    rateEditLine.style.display    = editing ? 'flex' : 'none';
    rateEditBtn.textContent = editing ? 'Save' : 'Edit';
    rateEditBtn.className   = editing ? 'rate-save-btn' : 'rate-edit-btn';
    if (editing) rateInputLeft.focus();
  }

  rateEditBtn.addEventListener('click', () => {
    if (!rateEditing) {
      setRateEditMode(true);
    } else {
      const leftAmt  = parseFloat(rateInputLeft.value);
      const rightAmt = parseFloat(rateInputRight.value);
      if (leftAmt > 0 && rightAmt > 0) {
        const perUnit = rightAmt / leftAmt;
        if (isNGNtoGHS) {
          rates.NGN_GHS = perUnit;
          rates.GHS_NGN = parseFloat((1 / perUnit).toFixed(6));
        } else {
          rates.GHS_NGN = perUnit;
          rates.NGN_GHS = parseFloat((1 / perUnit).toFixed(6));
        }
      }
      updateRateCard();
      updateDisplays();
      setRateEditMode(false);
    }
  });

  /* ── Swap ── */
  swapBtn.addEventListener('click', () => {
    isNGNtoGHS = !isNGNtoGHS;
    nativeInput.value = '';
    swapBtn.classList.add('spin');
    setTimeout(() => swapBtn.classList.remove('spin'), 210);
    updateLabels();
    updateDisplays();
  });

  /* ── Convert ── */
  ctaBtn.addEventListener('click', () => {
    const amount = parseFloat(nativeInput.value);
    if (!amount || amount <= 0) { openKeypad(); return; }
    const from   = isNGNtoGHS ? 'NGN' : 'GHS';
    const to     = isNGNtoGHS ? 'GHS' : 'NGN';
    const result = amount * currentRate();
    addHistoryEntry(from, to, amount, result);
    toDisplay.style.color = '#16a34a';
    setTimeout(() => toDisplay.style.color = '', 600);
  });

  /* ── History ── */
  const HISTORY_KEY = 'ngn_ghs_history';

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
    catch { return []; }
  }

  function saveHistory(items) {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(items));
  }

  function addHistoryEntry(from, to, amount, result) {
    const items = loadHistory();
    items.unshift({ from, to, amount, result, ts: Date.now() });
    if (items.length > 50) items.pop();
    saveHistory(items);
  }

  function formatTime(ts) {
    const diffMin = Math.floor((Date.now() - ts) / 60000);
    if (diffMin < 1)  return 'Just now';
    if (diffMin < 60) return `${diffMin}m ago`;
    const diffH = Math.floor(diffMin / 60);
    if (diffH < 24)   return `${diffH}h ago`;
    return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function renderHistory() {
    const items = loadHistory();
    if (items.length === 0) {
      historyList.innerHTML = `
        <div class="history-empty">
          <div class="history-empty-icon">🕐</div>
          <div class="history-empty-text">No conversions yet</div>
          <div class="history-empty-sub">Your converted amounts will appear here</div>
        </div>`;
      return;
    }
    historyList.innerHTML = items.map(item => {
      const fromSym = CURRENCIES[item.from].symbol;
      const toSym   = CURRENCIES[item.to].symbol;
      const amtFmt  = parseFloat(item.amount).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const resFmt  = parseFloat(item.result).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
      return `
        <div class="history-item">
          <div class="history-amounts">
            <div class="history-from">${fromSym}${amtFmt}</div>
            <div class="history-arrow">
              <svg width="14" height="22" viewBox="0 0 14 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                <line x1="2" y1="0" x2="2" y2="14" stroke="#d0d0d0" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="2" y1="14" x2="12" y2="14" stroke="#d0d0d0" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="12" cy="14" r="2" fill="#b0b0b0"/>
              </svg>
              <div class="history-to">${toSym}${resFmt}</div>
            </div>
          </div>
          <div class="history-meta">
            <span class="history-direction">${item.from} → ${item.to}</span>
            <span class="history-time">${formatTime(item.ts)}</span>
          </div>
        </div>`;
    }).join('');
  }

  clearBtn.addEventListener('click', () => {
    saveHistory([]);
    renderHistory();
  });

  /* ── Tab switching ── */
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`view-${tab.dataset.view}`).classList.add('active');
      if (tab.dataset.view === 'history') renderHistory();
    });
  });

  /* ── Init ── */
  updateLabels();
  updateRateCard();
  updateDisplays();
</script>
</body>
</html>
